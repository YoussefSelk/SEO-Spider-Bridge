name: Bug report
description: Report a defect that impacts expected behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue. Please provide enough detail for us to reproduce and fix it quickly.
  - type: input
    id: summary
    attributes:
      label: Short summary
      description: One-sentence description of the bug.
      placeholder: Engine activation fails after a valid license is issued.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact steps, request samples, and relevant config.
      placeholder: |
        1. Deploy engine with Docker and set LICENSE_KEY/PROJECT_ID
        2. Start engine and call activation flow
        3. Observe activation response and engine logs
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Engine should verify entitlement and report active status.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: Activation returns 403 and engine remains in disabled mode.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Describe user/business impact and severity.
      placeholder: Blocks onboarding for new customers and prevents paid usage.
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Local
        - Staging
        - Production
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Branch, tag, or commit hash if known.
      placeholder: main@abc1234
  - type: textarea
    id: logs
    attributes:
      label: Logs and screenshots
      description: Paste any relevant logs, traces, or screenshots.
