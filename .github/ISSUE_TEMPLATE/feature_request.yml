name: Feature request
description: Propose a new capability or improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Please describe the problem and desired outcome clearly.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user or business problem are we solving?
      placeholder: Customers cannot self-serve activation troubleshooting during onboarding.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe expected behavior and user flow.
      placeholder: Add an activation diagnostics page with entitlement and machine status.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List any alternatives or tradeoffs.
  - type: dropdown
    id: area
    attributes:
      label: Primary area
      options:
        - Control Plane API
        - Dashboard (Customer/Admin)
        - Licensing and Activations
        - Engine Runtime
        - Cache and Datastore Adapter
        - Billing and Plan Management
        - Documentation
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know this is complete?
      placeholder: |
        - Users can see quota usage in dashboard
        - Alert appears at 80% and 95%
        - Events emitted for threshold crossings
    validations:
      required: true
